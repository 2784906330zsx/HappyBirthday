<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="shortcut icon" type="image/png" href="img/favicon.png"/>
    <link rel="stylesheet" href="style/index.css">
</head>

<body>
<div class="background">
    <div class="info">
        <img src="img/background.jpg" alt="background.jpg">
        <div class="left-box"></div>

        <div class="time">

                    <p class="hour">00</p>
                    <span class="text">hours</span>

                    <p class="min">00</p>
                    <span class="text">min</span>
                </div>

                    <span class="text">sec</span>
                </div>
            </div>
            <p class="sub-title">This website is developed by ZSX specifically for Miss ZJW.</p>
            <p class="sub-title">And it aims to celebrate and commemorate her 21st birthday.</p>
